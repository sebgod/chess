<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess — in your browser</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <!-- Same icon as the desktop GUI (Chess.GUI/Resources/chess.ico). -->
    <link rel="icon" href="favicon.ico" sizes="any" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="boot">
            <div class="boot-spinner"></div>
            <div class="boot-text">Loading the chess engine…</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <!-- Canvas blit interop: RGBA byte[] -> ImageData -> putImageData. -->
    <script src="js/chess-canvas.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
